<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Petit Français</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap');

        :root {
            --red: #d62828;
            --red-dark: #9e1b1b;
            --orange: #f77f00;
            --yellow: #fcbf49;
            --yellow-light: #ffe9b8;
            --cream: #fff6e0;
            --paper: #fffdf5;
            --ink: #4a2b12;
            --green: #3e9e4e;
            --shadow: rgba(74, 43, 18, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Nunito", sans-serif;
            color: var(--ink);
            background: var(--cream);
            background-image: radial-gradient(rgba(214, 40, 40, 0.06) 2px, transparent 2px);
            background-size: 28px 28px;
            min-height: 100vh;
        }

        .hidden {
            display: none !important;
        }

        h1,
        h2,
        h3,
        .fredoka {
            font-family: "Fredoka", "Nunito", sans-serif;
        }

        /* ---------- HEADER ---------- */
        header {
            background: var(--red);
            border-bottom: 4px solid var(--ink);
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-emoji {
            font-size: 40px;
            display: inline-block;
            animation: bob 2s ease-in-out infinite;
        }

        @keyframes bob {

            0%,
            100% {
                transform: translateY(0) rotate(-6deg);
            }

            50% {
                transform: translateY(-6px) rotate(6deg);
            }
        }

        .brand h1 {
            color: #fff;
            font-size: 26px;
            line-height: 1.1;
            text-shadow: 2px 2px 0 var(--red-dark);
        }

        .brand p {
            color: var(--yellow-light);
            font-size: 13px;
            font-weight: 700;
        }

        .top-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            background: var(--yellow);
            border: 2px solid var(--ink);
            border-radius: 999px;
            padding: 4px 12px;
            font-weight: 800;
            font-size: 13px;
            white-space: nowrap;
        }

        /* ---------- BUTTONS ---------- */
        .btn {
            font-family: "Fredoka", sans-serif;
            font-weight: 600;
            font-size: 16px;
            color: var(--ink);
            background: var(--yellow);
            border: 3px solid var(--ink);
            border-radius: 999px;
            padding: 9px 22px;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--ink);
            transition: transform 0.06s, box-shadow 0.06s;
        }

        .btn:hover {
            background: var(--yellow-light);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 var(--ink);
        }

        .btn.primary {
            background: var(--red);
            color: #fff;
        }

        .btn.primary:hover {
            background: #e63e3e;
        }

        .btn.small {
            font-size: 14px;
            padding: 6px 16px;
        }

        .btn.lang {
            background: #fff;
            font-size: 15px;
            padding: 7px 16px;
        }

        /* ---------- TABS ---------- */
        nav {
            display: flex;
            gap: 8px;
            padding: 14px 16px 6px;
            max-width: 820px;
            margin: 0 auto;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab {
            font-family: "Fredoka", sans-serif;
            font-weight: 600;
            font-size: 15px;
            background: var(--paper);
            color: var(--ink);
            border: 3px solid var(--ink);
            border-radius: 999px;
            padding: 8px 16px;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 3px 0 var(--ink);
            flex-shrink: 0;
        }

        .tab.active {
            background: var(--red);
            color: #fff;
        }

        /* ---------- LAYOUT ---------- */
        main {
            max-width: 820px;
            margin: 0 auto;
            padding: 14px 16px 150px;
        }

        .tabpane>h2 {
            font-size: 26px;
            margin-bottom: 2px;
        }

        .sub {
            font-weight: 700;
            color: #8a6a4a;
            margin-bottom: 16px;
        }

        .card {
            background: var(--paper);
            border: 3px solid var(--ink);
            border-radius: 18px;
            box-shadow: 6px 6px 0 var(--shadow);
            padding: 18px;
        }

        /* ---------- LESSON GRID ---------- */
        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(215px, 1fr));
            gap: 14px;
        }

        .lesson-card {
            background: var(--paper);
            border: 3px solid var(--ink);
            border-radius: 18px;
            box-shadow: 6px 6px 0 var(--shadow);
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .lesson-card:hover {
            transform: rotate(-1.5deg) scale(1.03);
        }

        .lesson-emoji {
            font-size: 42px;
        }

        .lesson-name {
            font-family: "Fredoka", sans-serif;
            font-weight: 600;
            font-size: 19px;
            margin: 4px 0 2px;
        }

        .lesson-meta {
            font-size: 12px;
            font-weight: 700;
            color: #8a6a4a;
            margin-bottom: 6px;
        }

        .lesson-stars {
            font-size: 20px;
            color: var(--orange);
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        /* ---------- TEACH CARD ---------- */
        .teach-wrap {
            text-align: center;
        }

        .count-label {
            font-weight: 800;
            font-size: 13px;
            color: #8a6a4a;
            margin-bottom: 8px;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            border: 2px solid var(--ink);
            background: var(--paper);
        }

        .dot.done {
            background: var(--yellow);
        }

        .dot.now {
            background: var(--red);
        }

        .teach-card {
            background: var(--paper);
            border: 3px solid var(--ink);
            border-radius: 20px;
            box-shadow: 7px 7px 0 var(--shadow);
            padding: 26px 18px;
            max-width: 420px;
            margin: 0 auto 16px;
            transform: rotate(-0.8deg);
        }

        .teach-emoji {
            font-size: 62px;
        }

        .teach-fr {
            font-family: "Fredoka", sans-serif;
            font-weight: 700;
            font-size: 38px;
            color: var(--red);
            margin: 6px 0 0;
        }

        .teach-en {
            font-size: 20px;
            font-weight: 800;
            margin-top: 10px;
        }

        .mini-label {
            display: inline-block;
            background: var(--yellow-light);
            border: 2px solid var(--ink);
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            padding: 2px 10px;
            margin-top: 6px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ---------- QUESTIONS ---------- */
        .q-card {
            background: var(--paper);
            border: 3px solid var(--ink);
            border-radius: 20px;
            box-shadow: 6px 6px 0 var(--shadow);
            padding: 20px;
            text-align: center;
            max-width: 420px;
            margin: 0 auto 14px;
            transform: rotate(-0.6deg);
        }

        .q-label {
            font-size: 13px;
            font-weight: 800;
            color: #8a6a4a;
        }

        .q-word {
            font-family: "Fredoka", sans-serif;
            font-weight: 700;
            font-size: 32px;
            color: var(--red);
            margin-top: 4px;
        }

        .q-word .mini-speak {
            font-size: 20px;
            cursor: pointer;
            border: none;
            background: none;
            vertical-align: middle;
        }

        .answers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-width: 520px;
            margin: 0 auto;
        }

        .answer {
            font-family: "Nunito", sans-serif;
            font-weight: 800;
            font-size: 15px;
            background: var(--paper);
            color: var(--ink);
            border: 3px solid var(--ink);
            border-radius: 14px;
            padding: 13px 8px;
            cursor: pointer;
            box-shadow: 0 3px 0 var(--ink);
        }

        .answer:hover:not(:disabled) {
            background: var(--yellow-light);
        }

        .answer:disabled {
            cursor: default;
        }

        .answer.right {
            background: var(--green);
            color: #fff;
        }

        .answer.wrong {
            background: var(--red);
            color: #fff;
        }

        .feedback {
            text-align: center;
            font-family: "Fredoka", sans-serif;
            font-weight: 600;
            font-size: 18px;
            min-height: 30px;
            margin: 12px 0 4px;
        }

        .q-foot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 520px;
            margin: 0 auto;
        }

        .score-line {
            font-weight: 800;
            font-size: 13px;
            color: #8a6a4a;
        }

        /* ---------- RESULT ---------- */
        .result {
            text-align: center;
            padding: 24px 12px;
        }

        .result-stars {
            font-size: 54px;
            color: var(--yellow);
            -webkit-text-stroke: 2px var(--ink);
            letter-spacing: 8px;
        }

        .result h2 {
            font-size: 28px;
            margin: 8px 0 4px;
        }

        .result .big-xp {
            font-family: "Fredoka", sans-serif;
            font-size: 22px;
            color: var(--red);
            font-weight: 700;
            margin: 8px 0;
        }

        /* ---------- LISTEN ---------- */
        .listen-play {
            display: block;
            margin: 6px auto 18px;
            width: 100px;
            height: 100px;
            font-size: 42px;
            color: #fff;
            background: var(--red);
            cursor: pointer;
            border: 3px solid var(--ink);
            border-radius: 50%;
            box-shadow: 0 6px 0 var(--ink);
            transition: transform 0.06s, box-shadow 0.06s;
        }

        .listen-play:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 var(--ink);
        }

        /* ---------- MATCH ---------- */
        .match-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 560px;
            margin: 0 auto;
        }

        .match-tile {
            font-family: "Nunito", sans-serif;
            font-weight: 800;
            font-size: 14px;
            background: var(--paper);
            color: var(--ink);
            border: 3px solid var(--ink);
            border-radius: 14px;
            padding: 16px 4px;
            cursor: pointer;
            box-shadow: 0 3px 0 var(--ink);
        }

        .match-tile.selected {
            background: var(--yellow);
        }

        .match-tile.matched {
            background: var(--green);
            color: #fff;
            opacity: 0.8;
            cursor: default;
        }

        .match-tile.shake {
            animation: shake 0.3s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        .match-status {
            text-align: center;
            font-family: "Fredoka", sans-serif;
            font-weight: 600;
            font-size: 17px;
            min-height: 26px;
            margin-bottom: 14px;
        }

        /* ---------- PHRASES ---------- */
        .phrase-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--paper);
            border: 3px solid var(--ink);
            border-radius: 16px;
            box-shadow: 4px 4px 0 var(--shadow);
            padding: 12px 14px;
            margin-bottom: 10px;
        }

        .phrase-row:nth-child(odd) {
            transform: rotate(-0.4deg);
        }

        .phrase-row:nth-child(even) {
            transform: rotate(0.4deg);
        }

        .phrase-fr {
            font-family: "Fredoka", sans-serif;
            font-weight: 600;
            font-size: 17px;
            color: var(--red);
        }

        .phrase-en {
            font-size: 13px;
            font-weight: 700;
        }

        .phrase-say {
            font-size: 12px;
            font-weight: 700;
            color: var(--orange);
        }

        .speak-btn {
            flex-shrink: 0;
            width: 42px;
            height: 42px;
            font-size: 18px;
            background: var(--red);
            color: #fff;
            cursor: pointer;
            border: 3px solid var(--ink);
            border-radius: 50%;
            box-shadow: 0 3px 0 var(--ink);
        }

        .speak-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 var(--ink);
        }

        /* ---------- PROGRESS ---------- */
        .level-name {
            text-align: center;
            font-family: "Fredoka", sans-serif;
            font-weight: 700;
            font-size: 28px;
        }

        .level-next {
            text-align: center;
            font-weight: 800;
            font-size: 13px;
            color: #8a6a4a;
            margin: 2px 0 12px;
        }

        .xp-bar {
            height: 24px;
            background: #fff;
            border: 3px solid var(--ink);
            border-radius: 999px;
            padding: 3px;
            margin-bottom: 18px;
            overflow: hidden;
        }

        .xp-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 0.4s;
            background: repeating-linear-gradient(45deg, var(--red) 0 14px, var(--yellow) 14px 28px);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--yellow-light);
            border: 2px solid var(--ink);
            border-radius: 12px;
            padding: 9px 14px;
            margin-bottom: 8px;
            font-weight: 800;
        }

        /* ---------- COACH & TOAST ---------- */
        #coach {
            position: fixed;
            right: 14px;
            bottom: 14px;
            z-index: 300;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            pointer-events: none;
        }

        .coach-bubble {
            background: var(--paper);
            border: 3px solid var(--ink);
            border-radius: 16px 16px 4px 16px;
            box-shadow: 4px 4px 0 var(--shadow);
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 700;
            max-width: 230px;
        }

        .coach-face {
            font-size: 46px;
            animation: bob 2.4s ease-in-out infinite;
        }

        #toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 900;
            background: var(--yellow);
            border: 3px solid var(--ink);
            border-radius: 999px;
            box-shadow: 0 4px 0 var(--ink);
            padding: 10px 24px;
            font-family: "Fredoka", sans-serif;
            font-weight: 600;
            font-size: 15px;
            max-width: 90vw;
            text-align: center;
        }

        .confetti {
            position: fixed;
            top: -40px;
            z-index: 999;
            font-size: 24px;
            pointer-events: none;
            animation: fall 2.4s linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 540px) {
            .answers {
                grid-template-columns: 1fr;
            }

            .match-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .brand h1 {
                font-size: 21px;
            }

            .coach-bubble {
                display: none;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="brand">
            <span class="brand-emoji">🥖</span>
            <div>
                <h1>Le Petit Français</h1>
                <p data-i18n="tagline"></p>
            </div>
        </div>
        <div class="top-right">
            <span class="chip" id="chip-streak">🔥 0</span>
            <span class="chip" id="chip-xp">⭐ 0</span>
            <span class="chip" id="chip-level"></span>
            <button class="btn lang" id="lang-btn"></button>
        </div>
    </header>

    <nav>
        <button class="tab active" data-tab="learn" data-i18n="nav_learn"></button>
        <button class="tab" data-tab="quiz" data-i18n="nav_quiz"></button>
        <button class="tab" data-tab="listen" data-i18n="nav_listen"></button>
        <button class="tab" data-tab="match" data-i18n="nav_match"></button>
        <button class="tab" data-tab="phrases" data-i18n="nav_phrases"></button>
        <button class="tab" data-tab="progress" data-i18n="nav_progress"></button>
    </nav>

    <main>
        <!-- LEARN -->
        <section class="tabpane" id="tab-learn">
            <div id="learn-area"></div>
        </section>

        <!-- ENDLESS QUIZ -->
        <section class="tabpane hidden" id="tab-quiz">
            <h2 data-i18n="quiz_title"></h2>
            <p class="sub" data-i18n="quiz_sub"></p>
            <div class="q-card">
                <div class="q-label" id="quiz-dir"></div>
                <div class="q-word" id="quiz-word"></div>
            </div>
            <div class="answers" id="quiz-answers"></div>
            <div class="feedback" id="quiz-feedback"></div>
            <div class="q-foot">
                <span class="score-line" id="quiz-score"></span>
                <button class="btn small primary hidden" id="quiz-next" data-i18n="btn_next"></button>
            </div>
        </section>

        <!-- LISTEN -->
        <section class="tabpane hidden" id="tab-listen">
            <h2 data-i18n="listen_title"></h2>
            <p class="sub" data-i18n="listen_sub"></p>
            <button class="listen-play" id="listen-play">🔊</button>
            <div class="answers" id="listen-answers"></div>
            <div class="feedback" id="listen-feedback"></div>
            <div class="q-foot">
                <span class="score-line" id="listen-score"></span>
                <button class="btn small primary hidden" id="listen-next" data-i18n="btn_next"></button>
            </div>
        </section>

        <!-- MATCH -->
        <section class="tabpane hidden" id="tab-match">
            <h2 data-i18n="match_title"></h2>
            <p class="sub" data-i18n="match_sub"></p>
            <div class="match-status" id="match-status"></div>
            <div class="match-grid" id="match-grid"></div>
            <div style="text-align:center; margin-top:16px;">
                <button class="btn small" id="match-new" data-i18n="btn_newgame"></button>
            </div>
        </section>

        <!-- PHRASES -->
        <section class="tabpane hidden" id="tab-phrases">
            <h2 data-i18n="phrases_title"></h2>
            <p class="sub" data-i18n="phrases_sub"></p>
            <div id="phrase-list"></div>
        </section>

        <!-- PROGRESS -->
        <section class="tabpane hidden" id="tab-progress">
            <h2 data-i18n="prog_title"></h2>
            <p class="sub">&nbsp;</p>
            <div class="card">
                <div class="level-name" id="prog-level"></div>
                <div class="level-next" id="prog-next"></div>
                <div class="xp-bar">
                    <div class="xp-fill" id="prog-fill"></div>
                </div>
                <div class="stat-row"><span data-i18n="stat_xp"></span><b id="prog-xp">0</b></div>
                <div class="stat-row"><span data-i18n="stat_best"></span><b id="prog-best">0</b></div>
                <div class="stat-row"><span data-i18n="stat_lessons"></span><b id="prog-lessons">0</b></div>
                <div class="stat-row"><span data-i18n="stat_quiz"></span><b id="prog-quiz">0</b></div>
                <div style="text-align:center; margin-top:14px;">
                    <button class="btn small" id="prog-reset" data-i18n="btn_reset"></button>
                </div>
            </div>
        </section>
    </main>

    <div id="coach">
        <div class="coach-bubble" id="coach-tip"></div>
        <div class="coach-face">🥐</div>
    </div>
    <div id="toast" class="hidden"></div>

    <script>
        /* ================= TRANSLATIONS ================= */
        const T = {
            fr: {
                tagline: "Apprends le français en t'amusant !",
                nav_learn: "📚 Leçons", nav_quiz: "❓ Quiz", nav_listen: "👂 Écoute",
                nav_match: "🧩 Paires", nav_phrases: "💬 Phrases", nav_progress: "🏆 Progrès",
                learn_title: "Choisis une leçon !",
                learn_sub: "Chaque leçon = 10 mots + un mini-quiz. Facile !",
                lesson_words: "10 mots", btn_start: "Commencer !", btn_redo: "Rejouer 🔄",
                teach_count: "Mot {i} sur {n}",
                label_fr: "🇫🇷 en français", label_en: "🇬🇧 en anglais",
                btn_hear: "🔊 Écouter", btn_next: "Suivant →", btn_toquiz: "Mini-quiz ! 🚀",
                mini_count: "Question {i} sur {n}",
                q_tolang: "Que veut dire ce mot ?", q_fromlang: "Comment dit-on ça en français ?",
                res_title: "Leçon terminée !", res_score: "Score : {s} sur {n}",
                res_perfect: "Sans faute ! +20 XP bonus !", btn_back: "← Toutes les leçons",
                quiz_title: "Quiz infini", quiz_sub: "Tous les mots, dans les deux sens. Jusqu'où iras-tu ?",
                score: "Score : {r} / {t}", it_was: "C'était « {w} »",
                streak_fire: "🔥 {n} d'affilée ! En feu !",
                listen_title: "Jeu d'écoute", listen_sub: "Appuie sur play, puis choisis ce que tu as entendu !",
                match_title: "Trouve les paires", match_sub: "Associe chaque mot français à son jumeau anglais !",
                btn_newgame: "🔄 Nouvelle partie", match_left: "Bravo ! {n} paires restantes",
                match_win: "🏆 Toutes les paires ! Champion !",
                phrases_title: "Phrases de survie", phrases_sub: "Appuie sur 🔊 pour écouter la prononciation.",
                prog_title: "Ton progrès", prog_next: "{n} XP avant {lvl}", prog_max: "NIVEAU MAX ! Incroyable ! 👑",
                stat_xp: "⭐ XP total", stat_best: "🔥 Meilleure série",

        const ALL = LESSONS.flatMap(l => l.words);

        const PHRASES = [

        const LEVELS = [

        /* ================= STATE ================= */
        let lang = localStorage.getItem("lpf-lang") || "fr";
        let save = { xp: 0, best: 0, quizRight: 0, lessons: {} };
        try { Object.assign(save, JSON.parse(localStorage.getItem("lpf2-save") || "{}")); } catch (e) { }
        let streak = 0;

        const $ = (id) => document.getElementById(id);
        const t = (key) => T[lang][key];
        const fmt = (s, vars) => s.replace(/\{(\w+)\}/g, (_, k) => vars[k]);

        const shuffle = (arr) => arr.slice().sort(() => Math.random() - 0.5);
        const persist = () => localStorage.setItem("lpf2-save", JSON.stringify(save));

        /* ================= AUDIO ================= */
        function speak(text) {
            if (!("speechSynthesis" in window)) return;
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "fr-FR"; u.rate = 0.85;
            const v = speechSynthesis.getVoices().find(v => v.lang && v.lang.startsWith("fr"));
            if (v) u.voice = v;
            speechSynthesis.speak(u);
        }

        /* ================= XP / LEVELS ================= */
        function levelInfo(xp) {
            let cur = LEVELS[0], next = null;
            for (const l of LEVELS) { if (xp >= l.xp) cur = l; else { next = l; break; } }
            return { cur, next };
        }
        function refreshChips() {
            $("chip-xp").textContent = "⭐ " + save.xp;
            $("chip-streak").textContent = "🔥 " + streak;
            $("chip-level").textContent = levelInfo(save.xp).cur.name;
        }
        function addXP(n) {
            const before = levelInfo(save.xp).cur;
            save.xp += n; persist(); refreshChips();
            const after = levelInfo(save.xp).cur;
            if (after !== before) { confetti(); toast(fmt(t("levelup"), { lvl: after.name })); }
            renderProgress();
        }
        function bumpStreak(ok) {
            streak = ok ? streak + 1 : 0;
            if (streak > save.best) { save.best = streak; persist(); }
            refreshChips();
            if (ok && streak > 0 && streak % 5 === 0) { confetti(); toast(fmt(t("streak_fire"), { n: streak })); }
        }

        /* ================= FX ================= */
        let toastTimer = null;
        function toast(msg) {
            const el = $("toast");
            el.textContent = msg; el.classList.remove("hidden");
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.add("hidden"), 2600);
        }
        function confetti() {
            const emojis = ["🎉", "⭐", "🥐", "✨", "❤️", "💛", "🇫🇷"];
            for (let i = 0; i < 14; i++) {
                const s = document.createElement("span");
                s.className = "confetti"; s.textContent = rand(emojis);
                s.style.left = Math.random() * 100 + "vw";
                s.style.animationDelay = (Math.random() * 0.5) + "s";
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 3200);
            }
        }

        /* ================= TABS ================= */
        const started = {};
        document.querySelectorAll(".tab").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                document.querySelectorAll(".tabpane").forEach(p => p.classList.add("hidden"));
                const name = btn.dataset.tab;
                $("tab-" + name).classList.remove("hidden");
                if (name === "quiz" && !started.quiz) { started.quiz = true; newQuiz(); }
                if (name === "listen" && !started.listen) { started.listen = true; newListen(true); }
                if (name === "match" && !started.match) { started.match = true; newMatch(); }
                if (name === "progress") renderProgress();
            });
        });

        /* ================= LEARN (LESSONS) ================= */
        const learn = { view: "grid", lesson: null, idx: 0, qs: [], qIdx: 0, right: 0, answered: false };

        function makeMiniQuiz(lesson) {
            return shuffle(lesson.words).slice(0, 6).map(word => {
                const toEnglish = Math.random() < 0.5;
                const correct = toEnglish ? word.e : word.f;
                const pool = shuffle(lesson.words.filter(w => w !== word)).slice(0, 3)
                    .map(w => toEnglish ? w.e : w.f);
                return { word, toEnglish, correct, options: shuffle([correct, ...pool]) };
            });
        }

        function renderLearn() {
            const area = $("learn-area");

            if (learn.view === "grid") {
                let html = `<h2>${t("learn_title")}</h2><p class="sub">${t("learn_sub")}</p><div class="lesson-grid">`;

                    const stars = save.lessons[l.id] || 0;

                        learn.view = "teach"; learn.idx = 0;
                        renderLearn();
                        speak(learn.lesson.words[0].f);
                    });
                });
                return;
            }

            if (learn.view === "teach") {
                const L = learn.lesson, w = L.words[learn.idx], n = L.words.length;
                const dots = L.words.map((_, i) =>
                    `<span class="dot ${i < learn.idx ? "done" : i === learn.idx ? "now" : ""}"></span>`).join("");
                const last = learn.idx === n - 1;
                area.innerHTML = `<div class="teach-wrap">
      <div class="count-label">${L.emoji} ${lang === "fr" ? L.fr : L.en} — ${fmt(t("teach_count"), { i: learn.idx + 1, n })}</div>

                $("teach-hear").addEventListener("click", () => speak(w.f));
                $("teach-back").addEventListener("click", () => { learn.view = "grid"; renderLearn(); });

                        }
                        $("mini-next").classList.remove("hidden");

                    $("mini-answers").appendChild(b);
                });
                $("mini-next").addEventListener("click", () => {
                    learn.answered = false;
                    if (learn.qIdx < n - 1) { learn.qIdx++; renderLearn(); }
                    else {
                        const stars = learn.right >= 6 ? 3 : learn.right === 5 ? 2 : learn.right === 4 ? 1 : 0;
                        if (stars > (save.lessons[learn.lesson.id] || 0)) save.lessons[learn.lesson.id] = stars;

                        persist();
                        learn.view = "result"; learn.stars = stars;
                        renderLearn();
                        if (stars > 0) confetti();

      <div class="result-stars">${"★".repeat(learn.stars)}${"☆".repeat(3 - learn.stars)}</div>

        let quizRight = 0, quizAsked = 0;
        function newQuiz() {
            const word = rand(ALL);
            const toEnglish = Math.random() < 0.5;
            const correct = toEnglish ? word.e : word.f;
            $("quiz-dir").textContent = toEnglish ? t("q_tolang") : t("q_fromlang");
            $("quiz-word").innerHTML = word.emo + " " + (toEnglish ? word.f : word.e) +
                (toEnglish ? ' <button class="mini-speak" id="quiz-speak">🔊</button>' : "");
            if (toEnglish) $("quiz-speak").addEventListener("click", () => speak(word.f));
            $("quiz-feedback").textContent = "";
            $("quiz-next").classList.add("hidden");
            $("quiz-score").textContent = fmt(t("score"), { r: quizRight, t: quizAsked });

            const pool = shuffle(ALL.filter(w => w !== word)).slice(0, 3).map(w => toEnglish ? w.e : w.f);
            $("quiz-answers").innerHTML = "";
            shuffle([correct, ...pool]).forEach(opt => {
                const b = document.createElement("button");
                b.className = "answer"; b.textContent = opt;
                b.addEventListener("click", () => {
                    quizAsked++;
                    document.querySelectorAll("#quiz-answers .answer").forEach(x => {
                        x.disabled = true;
                        if (x.textContent === correct) x.classList.add("right");
                    });
                    if (opt === correct) {
                        quizRight++; save.quizRight++; persist();
                        bumpStreak(true); addXP(10);
                        $("quiz-feedback").textContent = rand(t("praise")) + " " + fmt(t("plus_xp"), { n: 10 });
                    } else {
                        b.classList.add("wrong"); bumpStreak(false);
                        $("quiz-feedback").textContent = rand(t("oops")) + " " + fmt(t("it_was"), { w: correct });
                    }
                    $("quiz-score").textContent = fmt(t("score"), { r: quizRight, t: quizAsked });
                    $("quiz-next").classList.remove("hidden");
                });
                $("quiz-answers").appendChild(b);
            });
        }
        $("quiz-next").addEventListener("click", newQuiz);

        /* ================= LISTEN ================= */
        let listenWord = null, listenRight = 0, listenAsked = 0;
        function newListen(autoplay) {
            listenWord = rand(ALL);
            $("listen-feedback").textContent = "";
            $("listen-next").classList.add("hidden");
            $("listen-score").textContent = fmt(t("score"), { r: listenRight, t: listenAsked });
            const pool = shuffle(ALL.filter(w => w !== listenWord)).slice(0, 3);
            $("listen-answers").innerHTML = "";
            shuffle([listenWord, ...pool]).forEach(w => {
                const b = document.createElement("button");
                b.className = "answer"; b.textContent = w.emo + " " + w.e;
                b.addEventListener("click", () => {
                    listenAsked++;
                    document.querySelectorAll("#listen-answers .answer").forEach(x => {
                        x.disabled = true;
                        if (x.textContent.endsWith(listenWord.e)) x.classList.add("right");
                    });
                    if (w === listenWord) {
                        listenRight++; save.quizRight++; persist();
                        bumpStreak(true); addXP(10);
                        $("listen-feedback").textContent = rand(t("praise")) + " « " + listenWord.f + " » " + fmt(t("plus_xp"), { n: 10 });
                    } else {
                        b.classList.add("wrong"); bumpStreak(false);
                        $("listen-feedback").textContent = rand(t("oops")) + " " + fmt(t("it_was"), { w: listenWord.f + " = " + listenWord.e });
                    }
                    $("listen-score").textContent = fmt(t("score"), { r: listenRight, t: listenAsked });
                    $("listen-next").classList.remove("hidden");
                });
                $("listen-answers").appendChild(b);
            });
            if (autoplay) setTimeout(() => speak(listenWord.f), 350);
        }
        $("listen-play").addEventListener("click", () => { if (listenWord) speak(listenWord.f); });
        $("listen-next").addEventListener("click", () => newListen(true));

        /* ================= MATCH ================= */
        let matchSel = null, matchLeft = 0;
        function newMatch() {
            const pairs = shuffle(ALL).slice(0, 6);
            matchLeft = pairs.length; matchSel = null;
            $("match-status").textContent = t("match_sub");
            const tiles = shuffle(pairs.flatMap((w, i) => [
                { id: i, text: w.f, lang: "f" },
                { id: i, text: w.emo + " " + w.e, lang: "e" }
            ]));
            $("match-grid").innerHTML = "";
            tiles.forEach(tile => {
                const b = document.createElement("button");
                b.className = "match-tile"; b.textContent = tile.text;
                b.addEventListener("click", () => {
                    if (b.classList.contains("matched") || (matchSel && matchSel.el === b)) return;
                    if (tile.lang === "f") speak(tile.text);
                    if (!matchSel) { matchSel = { ...tile, el: b }; b.classList.add("selected"); return; }
                    if (matchSel.id === tile.id && matchSel.lang !== tile.lang) {
                        b.classList.add("matched");
                        matchSel.el.classList.remove("selected");
                        matchSel.el.classList.add("matched");
                        matchLeft--; addXP(5);
                        if (matchLeft === 0) {
                            confetti();
                            $("match-status").textContent = t("match_win");
                        } else {
                            $("match-status").textContent = fmt(t("match_left"), { n: matchLeft });
                        }
                    } else {
                        const prev = matchSel.el;
                        prev.classList.remove("selected");
                        prev.classList.add("shake"); b.classList.add("shake");
                        setTimeout(() => { prev.classList.remove("shake"); b.classList.remove("shake"); }, 320);
                        $("match-status").textContent = rand(t("oops"));
                    }
                    matchSel = null;
                });
                $("match-grid").appendChild(b);
            });
        }
        $("match-new").addEventListener("click", newMatch);

        /* ================= PHRASES ================= */
        PHRASES.forEach(p => {
            const row = document.createElement("div");
            row.className = "phrase-row";
            row.innerHTML = `<button class="speak-btn">🔊</button>
    <div><div class="phrase-fr">${p.f}</div>
    <div class="phrase-en">${p.e}</div>
    <div class="phrase-say">🗣️ ${p.say}</div></div>`;
            row.querySelector(".speak-btn").addEventListener("click", () => speak(p.f));
            $("phrase-list").appendChild(row);
        });

        /* ================= PROGRESS ================= */
        function renderProgress() {
            const { cur, next } = levelInfo(save.xp);
            $("prog-level").textContent = cur.name;
            if (next) {
                $("prog-next").textContent = fmt(t("prog_next"), { n: next.xp - save.xp, lvl: next.name });
                $("prog-fill").style.width = Math.round((save.xp - cur.xp) / (next.xp - cur.xp) * 100) + "%";
            } else {
                $("prog-next").textContent = t("prog_max");
                $("prog-fill").style.width = "100%";
            }
            $("prog-xp").textContent = save.xp;
            $("prog-best").textContent = save.best;
            $("prog-lessons").textContent =
                Object.values(save.lessons).filter(s => s > 0).length + " / " + LESSONS.length;
            $("prog-quiz").textContent = save.quizRight;
        }
        $("prog-reset").addEventListener("click", () => {
            if (confirm(t("reset_confirm"))) {
                save = { xp: 0, best: 0, quizRight: 0, lessons: {} };
                streak = 0; persist(); refreshChips(); renderProgress();
                learn.view = "grid"; renderLearn();
                toast(t("reset_done"));
            }
        });

        /* ================= LANGUAGE TOGGLE ================= */
        function applyLang() {
            document.documentElement.lang = lang;
            document.querySelectorAll("[data-i18n]").forEach(el => {
                el.textContent = t(el.dataset.i18n);
            });
            $("lang-btn").textContent = t("lang_btn");
            $("coach-tip").textContent = "💡 " + t("tips")[tipIdx % t("tips").length];
            refreshChips();
            renderLearn();
            renderProgress();
            if (started.quiz) newQuiz();
            if (started.listen) newListen(false);
            if (started.match) $("match-status").textContent = matchLeft > 0 ? t("match_sub") : t("match_win");
        }
        $("lang-btn").addEventListener("click", () => {
            lang = lang === "fr" ? "en" : "fr";
            localStorage.setItem("lpf-lang", lang);
            applyLang();
        });

        /* ================= COACH TIPS ================= */
        let tipIdx = 0;
        setInterval(() => {
            tipIdx = (tipIdx + 1) % t("tips").length;
            $("coach-tip").textContent = "💡 " + t("tips")[tipIdx];
        }, 9000);

        /* ================= INIT ================= */
        if ("speechSynthesis" in window) speechSynthesis.getVoices();
        applyLang();
        setTimeout(() => toast(t("welcome")), 800);
    </script>
</body>

</html>
